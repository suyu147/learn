# =============================================================================
# SmartLearn — Docker Compose
# Phase 6: One-command deployment
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up -d
#   3. curl http://localhost:3000/api/v1/health
# =============================================================================

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # -- Database --
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-smartlearn}

      # -- AI Provider (primary) --
      AI_PROVIDER: ${AI_PROVIDER:-spark}
      AI_MODEL: ${AI_MODEL:-spark-4.0-turbo}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}

      # -- AI Provider API Keys --
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      GLM_API_KEY: ${GLM_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      SPARK_API_KEY: ${SPARK_API_KEY:-}

      # -- Spark (iFlytek) --
      SPARK_API_SECRET: ${SPARK_API_SECRET:-}
      SPARK_BASE_URL: ${SPARK_BASE_URL:-https://spark-api-open.xf-yun.com/v1}

      # -- Image Generation --
      DT_IMAGE_PROVIDER: ${DT_IMAGE_PROVIDER:-openai}
      IMAGE_GEN_API_KEY: ${IMAGE_GEN_API_KEY:-}
      IMAGE_GEN_BASE_URL: ${IMAGE_GEN_BASE_URL:-}
      IMAGE_GEN_MODEL: ${IMAGE_GEN_MODEL:-}

      # -- Voice / TTS --
      DT_VOICE_PROVIDER: ${DT_VOICE_PROVIDER:-openai}

      # -- Sandbox (Piston API) --
      DT_SANDBOX_URL: ${DT_SANDBOX_URL:-}

      # -- Web Search --
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

      # -- Auth --
      AUTH_MODE: ${AUTH_MODE:-disabled}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SINGLE_USER_NAME: ${SINGLE_USER_NAME:-admin}

      # -- Logging --
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LLM_THINKING_DISABLED: ${LLM_THINKING_DISABLED:-true}

      # -- Storage --
      DT_DATA_DIR: /app/data
    volumes:
      - appdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-smartlearn}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  appdata:
